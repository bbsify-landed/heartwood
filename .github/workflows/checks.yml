name: Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Coverage
        run: |
          go install github.com/vladopajic/go-test-coverage/v2/cmd/go-test-coverage@v2.18.4
          make coverage

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1.6
          install-mode: goinstall
